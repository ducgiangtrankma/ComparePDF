version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: comparepdf-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-comparepdf}
      POSTGRES_USER: ${POSTGRES_USER:-comparepdf_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-comparepdf_pass}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-comparepdf_user} -d ${POSTGRES_DB:-comparepdf}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
